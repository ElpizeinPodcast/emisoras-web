<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Radio Premium">
    <link rel="manifest" id="pwa-manifest">
    <!-- Icono base para la instalación -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230f172a'/%3E%3Cpath d='M256 80c-8.8 0-16 7.2-16 16v144c-35.3 0-64 28.7-64 64s28.7 64 64 64 64-28.7 64-64-28.7-64-64-64V96c0-8.8-7.2-16-16-16zM144 240c0-26.5-21.5-48-48-48s-48 21.5-48 48 21.5 48 48 48 48-21.5 48-48zm272-48c-26.5 0-48 21.5-48 48s21.5 48 48 48 48-21.5 48-48-21.5-48-48-48z' fill='%233b82f6'/%3E%3C/svg%3E">

    <title>Reproductor de Radio Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #000; /* Fallback for older browsers */
            background: radial-gradient(circle at top, #0f172a, #020617);
            /* Prevent scrolling on body to ensure app-like feel on mobile */
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        .text-gradient {
            background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-gradient-premium {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* Portada con altura dinámica para móviles */
        .cover-image {
            background-image: url('https://images.unsplash.com/photo-1504052434569-70ad5836ab65?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center 20%;
            /* Responsive height: smaller on mobile, slightly larger on desktop */
            height: 25vh;
            min-height: 150px;
            max-height: 220px;
        }

        /* Animación del ecualizador */
        .eq-bar {
            width: 3px; /* Slightly thinner for mobile */
            background-color: #3b82f6;
            border-radius: 4px;
            height: 4px;
            transition: height 0.2s ease;
        }

        .playing .eq-bar:nth-child(1) { animation: equalize 1s ease-in-out infinite; }
        .playing .eq-bar:nth-child(2) { animation: equalize 1.1s ease-in-out infinite 0.2s; }
        .playing .eq-bar:nth-child(3) { animation: equalize 0.9s ease-in-out infinite 0.4s; }
        .playing .eq-bar:nth-child(4) { animation: equalize 1.2s ease-in-out infinite 0.1s; }

        @keyframes equalize {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }

        /* Animación de pulso */
        .pulse-glow {
            animation: pulse-glow 2.5s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        /* Rango de volumen optimizado para toque */
        input[type=range] {
            /* Make the hit area larger on mobile */
            height: 24px;
            background: transparent;
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: #334155;
            border-radius: 8px;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            /* Center the thumb on the track */
            margin-top: -6px; 
        }
        /* Touch highlight removal for mobile buttons */
        button {
            -webkit-tap-highlight-color: transparent;
        }

        /* Ocultar la barra de scroll visualmente */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>

<body class="flex items-center justify-center h-[100dvh] w-full p-0 sm:p-4 select-none text-white overflow-hidden">

    <!-- Contenedor Principal: Ocupa toda la pantalla en móvil, tarjeta en escritorio -->
    <div class="glass-card w-full h-[100dvh] sm:h-auto sm:max-h-[90vh] sm:max-w-md sm:rounded-[36px] overflow-hidden relative flex flex-col">
        
        <!-- Elemento decorativo de fondo -->
        <div class="absolute top-1/3 left-1/2 -translate-x-1/2 w-64 h-64 sm:w-72 sm:h-72 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-10 pointer-events-none transition-opacity duration-700" id="player-aura"></div>

        <!-- Sección de Portada -->
        <div class="w-full cover-image relative flex-shrink-0">
            <!-- Capa de difuminado -->
            <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-[#0f172a]/70 to-transparent"></div>
            
            <!-- Etiqueta superior -->
            <div class="absolute top-8 sm:top-6 left-0 right-0 flex justify-center">
                <span class="bg-black/40 backdrop-blur-md px-4 py-1.5 rounded-full text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase text-slate-300 border border-white/10 shadow-lg">
                    Palabra & Alabanza
                </span>
            </div>
        </div>

        <!-- Contenedor de contenido flexible (ocupa el resto de la pantalla) -->
        <div class="px-6 sm:px-8 pb-8 pt-2 relative z-10 -mt-8 sm:-mt-12 flex-1 flex flex-col justify-between max-h-full overflow-y-auto hide-scrollbar">
            
            <!-- Agrupación superior (Título y Estaciones) -->
            <div class="flex flex-col">
                <!-- Encabezado -->
                <div class="flex justify-center items-center mb-6">
                    <div class="text-center">
                        <h1 class="text-2xl sm:text-3xl font-bold text-white drop-shadow-lg tracking-tight">REPRODUCTOR</h1>
                        <p class="text-blue-400 text-[10px] sm:text-xs font-semibold tracking-widest uppercase mt-0.5">Señal en Vivo</p>
                    </div>
                </div>

                <!-- Lista de Estaciones -->
                <div class="space-y-3 sm:space-y-4 mb-4 sm:mb-8">
                    <!-- Estación 1 -->
                    <button onclick="selectStation(0)" id="btn-station-0" class="w-full flex items-center p-3 sm:p-3.5 rounded-2xl bg-slate-800/60 border border-slate-700/50 active:bg-slate-700/80 transition-all group relative overflow-hidden">
                        <div id="icon-bg-0" class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-slate-800 flex items-center justify-center text-slate-400 mr-3 sm:mr-4 transition-all duration-300 relative z-10 shadow-inner border border-slate-700/50">
                            <i class="fas fa-tower-broadcast text-base sm:text-lg"></i>
                        </div>
                        <div class="flex-1 text-left relative z-10">
                            <h3 class="font-bold text-slate-100 text-[14px] sm:text-[15px]">BBN RADIO</h3>
                            <p class="text-[10px] sm:text-[11px] text-slate-400 mt-0.5 font-medium tracking-wide">Red de Radiodifusión</p>
                        </div>
                        <div id="eq-0" class="flex items-end h-4 gap-[2px] opacity-0 transition-opacity duration-300 mx-2 sm:mx-3 relative z-10">
                            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                        </div>
                    </button>

                    <!-- Estación 2 -->
                    <button onclick="selectStation(1)" id="btn-station-1" class="w-full flex items-center p-3 sm:p-3.5 rounded-2xl bg-slate-800/60 border border-slate-700/50 active:bg-slate-700/80 transition-all group relative overflow-hidden">
                        <div id="icon-bg-1" class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-slate-800 flex items-center justify-center text-slate-400 mr-3 sm:mr-4 transition-all duration-300 relative z-10 shadow-inner border border-slate-700/50">
                            <i class="fas fa-tower-broadcast text-base sm:text-lg"></i>
                        </div>
                        <div class="flex-1 text-left relative z-10">
                            <h3 class="font-bold text-slate-100 text-[14px] sm:text-[15px]">RADIO CEB</h3>
                            <p class="text-[10px] sm:text-[11px] text-slate-400 mt-0.5 font-medium tracking-wide">Streaming Web</p>
                        </div>
                        <div id="eq-1" class="flex items-end h-4 gap-[2px] opacity-0 transition-opacity duration-300 mx-2 sm:mx-3 relative z-10">
                            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Controles del Reproductor (Anclados abajo) -->
            <div class="flex flex-col items-center mt-auto">
                <!-- Status -->
                <div class="mb-5 sm:mb-6 h-5 flex items-center justify-center bg-slate-900/50 px-4 py-2.5 sm:py-3 rounded-full border border-slate-800">
                    <div id="statusDot" class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-slate-500 mr-2 transition-colors"></div>
                    <p id="status" class="text-slate-400 text-[9px] sm:text-[10px] font-bold tracking-widest uppercase transition-colors">Esperando selección</p>
                </div>

                <!-- Controles principales -->
                <div class="relative w-full flex items-center justify-center mb-4 sm:mb-2 gap-4">
                    <!-- Espaciador para centrar -->
                    <div class="w-10 h-10 sm:w-11 sm:h-11"></div>

                    <!-- Botón Play -->
                    <button onclick="togglePlay()" id="playPauseBtn" class="bg-gradient-premium text-white rounded-full w-[72px] h-[72px] sm:w-[88px] sm:h-[88px] flex items-center justify-center shadow-[0_10px_30px_rgba(37,99,235,0.4)] hover:scale-105 active:scale-95 transition-all duration-300 relative group z-20">
                        <div class="absolute inset-[2px] sm:inset-[3px] rounded-full border-[1.5px] border-white/20"></div>
                        <i id="playIcon" class="fas fa-play text-xl sm:text-2xl ml-1 sm:ml-1.5 drop-shadow-md"></i>
                    </button>
                    
                    <!-- Botón Recargar -->
                    <button onclick="reloadStation()" title="Recargar Emisora" class="w-10 h-10 sm:w-11 sm:h-11 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white active:bg-slate-700 transition-all border border-slate-700 active:scale-95 z-10 shadow-lg">
                        <i id="reloadIcon" class="fas fa-sync-alt text-xs sm:text-sm"></i>
                    </button>
                </div>

                <!-- Control de Volumen -->
                <div class="w-full mt-4 sm:mt-6 flex items-center justify-center gap-3 sm:gap-4 bg-slate-900/40 px-4 py-3 sm:py-3.5 rounded-2xl border border-slate-700/40">
                    <!-- Botón Mute -->
                    <button onclick="toggleMute()" class="w-6 flex justify-center text-slate-400 hover:text-blue-400 active:text-blue-300 transition-colors focus:outline-none p-1 sm:p-0">
                        <i id="volumeIcon" class="fas fa-volume-up text-xs sm:text-sm"></i>
                    </button>
                    
                    <!-- Slider interactivo -->
                    <div class="relative flex-1 flex items-center h-6">
                        <input type="range" id="volumeSlider" min="0" max="100" value="100" class="w-full appearance-none bg-transparent cursor-pointer relative z-10">
                        <!-- Custom Track behind the slider -->
                        <div class="absolute w-full h-1 bg-slate-700 rounded-lg top-1/2 -translate-y-1/2 pointer-events-none"></div>
                        <!-- Active track indicator -->
                        <div id="volumeProgress" class="absolute h-1 bg-blue-500 rounded-lg top-1/2 -translate-y-1/2 pointer-events-none" style="width: 100%;"></div>
                    </div>
                    
                    <!-- Valor Numérico -->
                    <div class="w-7 text-right">
                        <span id="volumeValue" class="text-slate-300 text-[10px] sm:text-xs font-bold font-mono">100</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Elemento de audio -->
        <audio id="audioPlayer" preload="none"></audio>
    </div>

    <script>
        const stations = [
            { name: "BBN RADIO", url: "https://audio-edge-5bkfj.fra.h.radiomast.io/475ebed1-595e-4717-b888-64fe8fc6b09f" },
            { name: "RADIO CEB", url: "https://mediacp16.rootservers.co:8018/stream" }
        ];

        let currentStationIndex = -1;
        const audio = document.getElementById('audioPlayer');
        const playIcon = document.getElementById('playIcon');
        const playBtn = document.getElementById('playPauseBtn');
        const statusText = document.getElementById('status');
        const statusDot = document.getElementById('statusDot');
        const aura = document.getElementById('player-aura');
        
        // Elementos de Volumen
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const volumeIcon = document.getElementById('volumeIcon');
        const volumeProgress = document.getElementById('volumeProgress');
        
        let previousVolume = 100;
        let isMuted = false;

        // Configuración inicial
        audio.volume = volumeSlider.value / 100;
        updateVolumeProgress(volumeSlider.value);

        function updateVolumeProgress(val) {
            volumeProgress.style.width = `${val}%`;
        }

        function updateVolumeIcon(vol) {
            volumeIcon.className = '';
            if (vol == 0 || isMuted) {
                volumeIcon.className = 'fas fa-volume-mute text-xs sm:text-sm text-red-400';
            } else if (vol < 50) {
                volumeIcon.className = 'fas fa-volume-down text-xs sm:text-sm';
            } else {
                volumeIcon.className = 'fas fa-volume-up text-xs sm:text-sm';
            }
        }

        volumeSlider.addEventListener('input', (e) => {
            const vol = parseInt(e.target.value);
            
            if (isMuted && vol > 0) {
                isMuted = false;
                audio.muted = false;
            }

            audio.volume = vol / 100;
            volumeValue.innerText = vol;
            updateVolumeProgress(vol);
            updateVolumeIcon(vol);
            
            if (vol === 0) {
                isMuted = true;
                audio.muted = true;
            } else {
                previousVolume = vol;
            }
        });

        function toggleMute() {
            if (isMuted) {
                isMuted = false;
                audio.muted = false;
                const volumeToRestore = previousVolume > 0 ? previousVolume : 50; 
                audio.volume = volumeToRestore / 100;
                volumeSlider.value = volumeToRestore;
                volumeValue.innerText = volumeToRestore;
                updateVolumeProgress(volumeToRestore);
            } else {
                isMuted = true;
                audio.muted = true;
                previousVolume = parseInt(volumeSlider.value);
                volumeSlider.value = 0;
                volumeValue.innerText = "0";
                updateVolumeProgress(0);
            }
            updateVolumeIcon(parseInt(volumeSlider.value));
        }

        function selectStation(index) {
            if (currentStationIndex === index) {
                togglePlay();
                return;
            }

            currentStationIndex = index;
            audio.src = stations[index].url;
            
            updateUI(index);
            updateStatus("CONECTANDO...", "blue");
            playAudio();
        }

        function updateUI(activeIndex) {
            stations.forEach((_, i) => {
                const btn = document.getElementById(`btn-station-${i}`);
                const iconBg = document.getElementById(`icon-bg-${i}`);
                const eq = document.getElementById(`eq-${i}`);
                
                if (i === activeIndex) {
                    btn.classList.add('border-blue-500/50', 'bg-blue-900/30');
                    btn.classList.remove('border-slate-700/50', 'bg-slate-800/60');
                    iconBg.classList.add('bg-blue-600', 'text-white', 'border-blue-500', 'shadow-[0_0_15px_rgba(37,99,235,0.4)]');
                    iconBg.classList.remove('bg-slate-800', 'text-slate-400', 'border-slate-700/50');
                    eq.classList.remove('opacity-0');
                    eq.classList.add('opacity-100');
                } else {
                    btn.classList.remove('border-blue-500/50', 'bg-blue-900/30');
                    btn.classList.add('border-slate-700/50', 'bg-slate-800/60');
                    iconBg.classList.remove('bg-blue-600', 'text-white', 'border-blue-500', 'shadow-[0_0_15px_rgba(37,99,235,0.4)]');
                    iconBg.classList.add('bg-slate-800', 'text-slate-400', 'border-slate-700/50');
                    eq.classList.add('opacity-0');
                    eq.classList.remove('opacity-100');
                    eq.classList.remove('playing');
                }
            });
        }

        function updateStatus(text, color) {
            statusText.innerText = text;
            statusText.className = `text-[9px] sm:text-[10px] font-bold tracking-widest uppercase transition-colors text-${color}-400`;
            statusDot.className = `w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full mr-2 transition-colors bg-${color}-500 shadow-[0_0_8px_rgba(var(--tw-colors-${color}-500),0.8)]`;
        }

        function togglePlay() {
            if (currentStationIndex === -1) {
                selectStation(0);
                return;
            }
            if (audio.paused) playAudio();
            else pauseAudio();
        }

        function playAudio() {
            audio.play().then(() => {
                playIcon.classList.remove('fa-play', 'ml-1', 'sm:ml-1.5');
                playIcon.classList.add('fa-pause');
                playBtn.classList.add('pulse-glow');
                aura.classList.replace('opacity-10', 'opacity-40');
                
                const activeEq = document.getElementById(`eq-${currentStationIndex}`);
                if(activeEq) activeEq.classList.add('playing');
                
                updateStatus("EN VIVO", "green");
            }).catch(error => {
                updateStatus("ERROR DE CONEXIÓN", "red");
                console.error("Error al reproducir:", error);
            });
        }

        function pauseAudio() {
            audio.pause();
            playIcon.classList.remove('fa-pause');
            playIcon.classList.add('fa-play', 'ml-1', 'sm:ml-1.5');
            playBtn.classList.remove('pulse-glow');
            aura.classList.replace('opacity-40', 'opacity-10');
            
            const activeEq = document.getElementById(`eq-${currentStationIndex}`);
            if(activeEq) activeEq.classList.remove('playing');
            
            updateStatus("PAUSADO", "slate");
        }

        function reloadStation() {
            if (currentStationIndex === -1) return; 
            
            const reloadIcon = document.getElementById('reloadIcon');
            reloadIcon.style.transition = 'transform 0.5s ease-in-out';
            reloadIcon.style.transform = `rotate(${reloadIcon.rotation || 360}deg)`;
            reloadIcon.rotation = (reloadIcon.rotation || 360) + 360;

            updateStatus("RECONECTANDO...", "blue");
            audio.src = stations[currentStationIndex].url; 
            audio.load();
            playAudio();
        }

        audio.addEventListener('waiting', () => updateStatus("CARGANDO...", "blue"));
        audio.addEventListener('playing', () => updateStatus("EN VIVO", "green"));
        audio.addEventListener('error', () => {
            updateStatus("SEÑAL CAÍDA", "red");
            pauseAudio();
        });

        // ==========================================
        // Lógica para PWA (Progressive Web App)
        // ==========================================
        
        // 1. Generar Manifest dinámicamente
        const iconSvg = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230f172a'/%3E%3Cpath d='M256 80c-8.8 0-16 7.2-16 16v144c-35.3 0-64 28.7-64 64s28.7 64 64 64 64-28.7 64-64-28.7-64-64-64V96c0-8.8-7.2-16-16-16zM144 240c0-26.5-21.5-48-48-48s-48 21.5-48 48 21.5 48 48 48 48-21.5 48-48zm272-48c-26.5 0-48 21.5-48 48s21.5 48 48 48 48-21.5 48-48-21.5-48-48-48z' fill='%233b82f6'/%3E%3C/svg%3E";
        
        const manifestJSON = {
            "name": "Radio Premium",
            "short_name": "Radio",
            "start_url": location.href,
            "display": "standalone",
            "background_color": "#020617",
            "theme_color": "#0f172a",
            "icons": [
                {
                    "src": iconSvg,
                    "sizes": "192x192 512x512",
                    "type": "image/svg+xml",
                    "purpose": "any maskable"
                }
            ]
        };

        const manifestBlob = new Blob([JSON.stringify(manifestJSON)], {type: 'application/json'});
        document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);

        // 2. Generar e instalar Service Worker dinámicamente
        const swCode = `
            self.addEventListener('install', event => self.skipWaiting());
            self.addEventListener('activate', event => event.waitUntil(clients.claim()));
            self.addEventListener('fetch', event => {
                // No cacheamos los streams de audio para que siempre suenen en vivo
                if (event.request.url.includes('radiomast') || event.request.url.includes('rootservers')) {
                    return;
                }
                event.respondWith(fetch(event.request).catch(() => new Response("Offline")));
            });
        `;
        
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(swBlob);
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(swUrl)
                    .then(reg => console.log('Service Worker registrado con éxito para la PWA.'))
                    .catch(err => console.log('Error al registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
